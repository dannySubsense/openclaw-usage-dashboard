<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Token Usage Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-cards: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: #475569;
            --color-moonshot: #4c8bf5;
            --color-anthropic: #d97706;
            --color-cron: #8b5cf6;
            --color-interactive: #10b981;
            --color-warning: #ef4444;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
        }

        header {
            background-color: var(--bg-cards);
            border-bottom: 1px solid var(--border-color);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        #generated-time {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem 2rem 1rem;
        }

        section {
            margin-bottom: 2rem;
            background-color: var(--bg-cards);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1.5rem;
        }

        section h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .grid {
            display: grid;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .card {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .card-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .card-value {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card.moonshot {
            border-left: 4px solid var(--color-moonshot);
        }

        .card.anthropic {
            border-left: 4px solid var(--color-anthropic);
        }

        .budget-bar-container {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            height: 2rem;
            overflow: hidden;
            margin: 1rem 0;
        }

        .budget-bar {
            height: 100%;
            transition: width 0.3s ease;
            background-color: var(--color-interactive);
        }

        .budget-bar.warning {
            background-color: var(--color-warning);
        }

        .budget-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .budget-info-item {
            display: flex;
            justify-content: space-between;
        }

        .chart-container {
            position: relative;
            height: 350px;
            margin-bottom: 1rem;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            background-color: var(--bg-primary);
            border-bottom: 2px solid var(--border-color);
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .anomaly-card {
            background-color: var(--bg-primary);
            border-left: 4px solid var(--color-warning);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--color-warning);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .anomaly-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .anomaly-model {
            font-weight: 600;
            color: var(--color-warning);
        }

        .anomaly-cost {
            color: var(--text-secondary);
        }

        .anomaly-details p {
            margin: 0.25rem 0;
            font-size: 0.9rem;
        }

        footer {
            background-color: var(--bg-cards);
            border-top: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            text-align: center;
            color: var(--text-secondary);
            margin-top: 2rem;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            main {
                padding: 0 1rem;
            }

            .grid-3 {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .chart-container {
                height: 300px;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 1.5rem 1rem;
            }

            header h1 {
                font-size: 1.5rem;
            }

            main {
                padding: 0 0.75rem;
            }

            section {
                padding: 1rem;
                margin-bottom: 1.5rem;
            }

            section h2 {
                font-size: 1.1rem;
            }

            .grid {
                gap: 1rem;
            }

            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }

            .card-value {
                font-size: 1.4rem;
            }

            .charts-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .chart-container {
                height: 250px;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 0.5rem;
            }

            .anomaly-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .anomaly-cost {
                margin-top: 0.5rem;
            }

            footer {
                padding: 1rem;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {

            }

            }

            .card-value {

            }

            table {

        }
    </style>
</head>
